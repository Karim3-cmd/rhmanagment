global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST:-smtp.gmail.com:587}'
  smtp_from: '${SMTP_FROM:-alerts@hrbrain.local}'
  smtp_auth_username: '${SMTP_USERNAME:-alerts@hrbrain.local}'
  smtp_auth_password: '${SMTP_PASSWORD:-change-me}'
  smtp_require_tls: true

route:
  receiver: admin-email
  group_by: ['alertname', 'service']
  group_wait: 20s
  group_interval: 2m
  repeat_interval: 1h

receivers:
  - name: admin-email
    email_configs:
      - to: '${ADMIN_EMAIL:-admin@hrbrain.local}'
        send_resolved: true
        headers:
          subject: '[HRBrain Alert] {{ .CommonLabels.alertname }} - {{ .CommonLabels.severity }}'
