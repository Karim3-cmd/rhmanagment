apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: kubernetes-pods-annotated
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
      - job_name: frontend-blackbox
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://hrbrain-frontend.hrbrain.svc.cluster.local/health
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
  alerts.yml: |
    groups:
      - name: hrbrain-availability
        rules:
          - alert: BackendDown
            expr: up{job="kubernetes-pods-annotated", app="hrbrain-backend"} == 0
            for: 1m
            labels:
              severity: critical
              service: backend
            annotations:
              summary: "HRBrain backend metrics are down"
              description: "The backend /metrics endpoint cannot be scraped."
          - alert: FrontendDown
            expr: probe_success{job="frontend-blackbox"} == 0
            for: 1m
            labels:
              severity: critical
              service: frontend
            annotations:
              summary: "HRBrain frontend healthcheck is down"
              description: "The frontend /health endpoint is not returning HTTP 2xx."
          - alert: BackendHighMemory
            expr: hrbrain_api_memory_rss_bytes > 700000000
            for: 3m
            labels:
              severity: warning
              service: backend
            annotations:
              summary: "Backend memory is high"
              description: "Backend RSS memory is above 700 MB."
