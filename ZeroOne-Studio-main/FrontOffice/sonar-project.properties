# ─────────────────────────────────────────────────────────────────────────────
# SonarQube – Configuration Frontend (React / Vite)
# Projet : HRBrain FrontOffice
# ─────────────────────────────────────────────────────────────────────────────

# Identification du projet
sonar.projectKey=hrbrain-frontend
sonar.projectName=HRBrain FrontOffice
sonar.projectVersion=0.0.1

# URL du serveur SonarQube (peut être surchargée via variable d'env dans Jenkins)
sonar.host.url=http://localhost:9000

# Répertoire des sources à analyser
sonar.sources=src

# Répertoire des tests
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.spec.tsx,**/*.test.ts,**/*.spec.ts

# Exclusions : fichiers générés, node_modules, dist, fichiers de config
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/test/setup.ts,\
  src/test/**

# Rapport de couverture LCOV généré par Vitest (npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Rapport de tests JUnit XML généré par Vitest
sonar.testExecutionReportPaths=test-results/junit.xml

# Encodage des sources
sonar.sourceEncoding=UTF-8

# Langage principal
sonar.language=ts

# TypeScript : chemin vers le tsconfig (si présent)
# sonar.typescript.tsconfigPath=tsconfig.json

# Quality Gate : échouer le pipeline si le Quality Gate n'est pas atteint
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
