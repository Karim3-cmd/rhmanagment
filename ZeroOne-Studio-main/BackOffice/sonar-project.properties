# ─────────────────────────────────────────────────────────────────────────────
# SonarQube – Configuration Backend (NestJS)
# Projet : HRBrain BackOffice
# ─────────────────────────────────────────────────────────────────────────────

# Identification du projet
sonar.projectKey=hrbrain-backend
sonar.projectName=HRBrain BackOffice
sonar.projectVersion=0.0.1

# URL du serveur SonarQube (peut être surchargée via variable d'env dans Jenkins)
sonar.host.url=http://localhost:9000

# Répertoire des sources à analyser
sonar.sources=src

# Répertoire des tests (exclus de l'analyse principale mais inclus pour la couverture)
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Exclusions : fichiers générés, node_modules, dist, fichiers de config
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.js,\
  **/coverage/**,\
  **/*.d.ts,\
  **/test/**

# Rapport de couverture LCOV généré par Jest (npm run test:cov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Rapport de tests JUnit XML
sonar.testExecutionReportPaths=coverage/test-reporter.xml

# Encodage des sources
sonar.sourceEncoding=UTF-8

# Langage principal
sonar.language=ts

# TypeScript : chemin vers le tsconfig
sonar.typescript.tsconfigPath=tsconfig.json

# Quality Gate : échouer le pipeline si le Quality Gate n'est pas atteint
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
